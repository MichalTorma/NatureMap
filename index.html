<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mymap</title>
  </head>
  <body>
    <div id="map"></div>
    
    <!-- Floating Location Controls (Always reachable bottom-right) -->
    <div id="location-control" class="location-control floating">
      <button id="share-btn" class="locate-fab" aria-label="Share Map Link" title="Copy mapped view to clipboard">
        <i data-lucide="link"></i>
      </button>
      <button id="locate-btn" class="locate-fab" aria-label="Find My Location">
        <i data-lucide="locate"></i>
      </button>
      <div id="privacy-badge" class="privacy-notice mini">
        <i data-lucide="shield-check"></i>
        <div class="tooltip">Anonymous & Private: We don't track you.</div>
      </div>
    </div>

    <div id="ui-panel" class="glass-panel collapsed">
      <div class="drag-handle"></div>
      
      <div class="panel-header">
        <h1>MAP STYLING</h1>
        <p class="subtitle desktop-only">Configure your mapping experience</p>
      </div>

      <div class="ui-section collapsible active" id="styling-section">
        <div class="section-header">
          <h2>BASE LAYERS</h2>
          <i data-lucide="chevron-down" class="chevron"></i>
        </div>
        <div class="section-content">
          <div id="layer-options" class="layer-options">
            <!-- Buttons will be injected here dynamically -->
          </div>
        </div>
      </div>
      
      <div class="ui-section collapsible" id="gbif-section">
        <div class="section-header">
          <h2>BIODIVERSITY</h2>
          <i data-lucide="chevron-down" class="chevron"></i>
        </div>
        <div class="section-content">
          <div class="search-container">
            <input type="text" id="gbif-search" placeholder="Search All Biodiversity..." autocomplete="off">
            <ul id="gbif-results" class="search-results"></ul>
          </div>
          <div id="gbif-history" class="history-shelf"></div>
          
          <div class="filter-controls">
            <div class="control-group">
              <span class="label">Visualization Shape</span>
              <div class="picker-grid" id="gbif-shape-picker">
                <button class="picker-btn active" data-shape="hex" title="Hexagonal Grid">
                  <i data-lucide="hexagon"></i>
                </button>
                <button class="picker-btn" data-shape="square" title="Square Grid">
                  <i data-lucide="layout-grid"></i>
                </button>
                <button class="picker-btn" data-shape="point" title="Individual Records">
                  <i data-lucide="map-pin"></i>
                </button>
                <button class="picker-btn" data-shape="heatmap" title="Density Heatmap">
                  <i data-lucide="wind"></i>
                </button>
              </div>
            </div>

            <div class="control-group">
              <div class="label-row">
                <span class="label">Color Palette</span>
                <span id="palette-status" class="val-tag status-tag">Ready</span>
              </div>
              <div class="palette-picker" id="gbif-palette-picker">
                <button class="palette-btn active" data-palette="classic" style="--color-main: #ffde38; --color-sec: #f44336" title="Classic"><div class="badge"></div></button>
                <button class="palette-btn" data-palette="green" style="--color-main: #a5d6a7; --color-sec: #1b5e20" title="Forest"><div class="badge"></div></button>
                <button class="palette-btn" data-palette="blue" style="--color-main: #90caf9; --color-sec: #0d47a1" title="Ocean"><div class="badge"></div></button>
                <button class="palette-btn" data-palette="orange" style="--color-main: #ffcc80; --color-sec: #e65100" title="Fire"><div class="badge"></div></button>
                <button class="palette-btn" data-palette="purpleHeat" style="--color-main: #ce93d8; --color-sec: #4a148c" title="Royal"><div class="badge"></div></button>
              </div>
            </div>

            <div class="advanced-section">
              <div class="advanced-header" id="advanced-toggle">
                <span>Scientific Tuning</span>
                <i data-lucide="settings-2"></i>
              </div>
              <div class="advanced-drawer" id="advanced-drawer" style="display: none;">
                <div class="control-group">
                  <div class="label-row" style="margin-bottom: 8px;">
                    <span class="label" title="How the grid visually responds when zooming the map">Scale Behavior</span>
                  </div>
                  <div id="gbif-scale-mode" class="button-toggle-group">
                    <button class="toggle-btn active" data-mode="static" title="Hexagons always remain the same visual size on your screen">Static Area</button>
                    <button class="toggle-btn" data-mode="geographic" title="Hexagons expand visually to lock onto their physical geographic boundaries">Geo Locked</button>
                  </div>
                </div>
                <div class="control-group" style="padding-top: 10px;">
                  <div class="label-row">
                    <span class="label" title="Base number of bins per map tile">Base Resolution</span>
                    <span id="density-value" class="val-tag">45 Bins</span>
                  </div>
                  <input type="range" id="gbif-density" min="10" max="150" value="45" step="1">
                </div>
                <div class="control-group">
                  <div class="label-row">
                    <span class="label">Opacity</span>
                    <span id="opacity-value" class="val-tag">80%</span>
                  </div>
                  <input type="range" id="gbif-opacity" min="0.1" max="1" value="0.8" step="0.1">
                </div>
              </div>
            </div>
            
            <div class="control-group">
              <span class="label" title="Cumulative Range">Timeline</span>
              <div class="timeline-control">
                <button id="gbif-play" class="play-btn" title="Play Evolution"><i data-lucide="play"></i></button>
                <input type="range" id="gbif-year" min="1900" max="2025" value="2025" step="1">
                <span id="year-value">All Years</span>
              </div>
            </div>
            
            <div class="control-group">
              <span class="label">Origin</span>
              <div id="gbif-origin" class="button-toggle-group">
                <button class="toggle-btn active" data-value="HUMAN_OBSERVATION">Human</button>
                <button class="toggle-btn" data-value="PRESERVED_SPECIMEN">Museum</button>
                <button class="toggle-btn active" data-value="ALL">All</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <canvas id="style-tester" width="256" height="256" style="display: none;"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
