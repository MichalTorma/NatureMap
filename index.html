<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mymap</title>
  </head>
  <body>
    <div id="map"></div>
    <div id="ui-panel" class="glass-panel">
      <h2>MAP STYLING</h2>
      <p class="subtitle">Select your base layer</p>
      
      <div class="layer-options">
        <button class="layer-btn active" data-layer="osm" aria-label="Standard Map">
          <i data-lucide="map"></i>
          <span>Standard</span>
        </button>
        <button class="layer-btn" data-layer="dark" aria-label="Dark Mode Map">
          <i data-lucide="moon"></i>
          <span>Dark</span>
        </button>
        <button class="layer-btn" data-layer="topo" aria-label="Topographic Map">
          <i data-lucide="mountain"></i>
          <span>Topography</span>
        </button>
        <button class="layer-btn" data-layer="satellite" aria-label="Satellite Map">
          <i data-lucide="satellite"></i>
          <span>Satellite</span>
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
